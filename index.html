<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>XÓA MÃ ẨN ĐẲNG CẤP LUÔN</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #2c1b10, #000);
      font-family: Consolas, monospace;
      color: #f5e6c8;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
      animation: flicker 0.15s infinite;
      pointer-events: none;
    }

    @keyframes flicker { 0% {opacity:.05} 50% {opacity:.15} 100% {opacity:.05} }

    .panel {
      width: 440px;
      background: rgba(20, 10, 5, 0.92);
      border: 1px solid rgba(255, 200, 120, 0.4);
      box-shadow: 0 0 25px rgba(255, 180, 80, 0.4);
      padding: 18px;
      border-radius: 10px;
      position: relative;
    }

    /* title glitch */
    .title-glitch{
      position: relative;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
      letter-spacing:2px;
      color:#ffcc66;
    }

    .title-glitch::before,
    .title-glitch::after{
      content: attr(data-text);
      position:absolute;
      left:0;
      width:100%;
      color:#ffcc66;
      overflow:hidden;
    }

    .title-glitch::before{
      animation: glitch1 1s infinite linear alternate-reverse;
      clip-path: inset(0 0 50% 0);
    }

    .title-glitch::after{
      animation: glitch2 1s infinite linear alternate-reverse;
      clip-path: inset(50% 0 0 0);
    }

    @keyframes glitch1{
      0%{transform:translate(0)}
      25%{transform:translate(-1px,-1px)}
      50%{transform:translate(1px,1px)}
      75%{transform:translate(-1px,1px)}
      100%{transform:translate(0)}
    }

    @keyframes glitch2{
      0%{transform:translate(0)}
      25%{transform:translate(1px,1px)}
      50%{transform:translate(-1px,-1px)}
      75%{transform:translate(1px,-1px)}
      100%{transform:translate(0)}
    }

    .alert {
      background: rgba(80, 30, 10, 0.6);
      border: 1px solid rgba(255, 200, 120, 0.3);
      padding: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      max-height: 42px;
      overflow-y: auto;
      cursor: pointer;
      scrollbar-width: thin; scrollbar-color: #ffcc66 transparent;
    }
    .alert::-webkit-scrollbar { width:4px }
    .alert::-webkit-scrollbar-thumb { background:#ffcc66; border-radius:10px }

    .alert div { padding: 4px; }
    .alert div:hover { background: rgba(255,200,120,0.2); }
    .alert .active { background: rgba(255,200,120,0.4); }

    .separator { border-top: 1px dashed rgba(255, 200, 120, 0.4); margin: 10px 0; }
    .field { margin-bottom: 10px; }
    .label { font-size: 12px; margin-bottom: 4px; opacity: 0.8; }

    input {
      width: 100%; padding: 8px; background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255, 200, 120, 0.4); color: #0f0; outline: none;
    }
    input:focus { border-color: #ffcc66; box-shadow: 0 0 5px #ffcc66; }

    .hint { font-size: 11px; opacity: .7; margin-top: 3px }
    .error { color: #ff6b6b; }

    .status {
      background: rgba(0,0,0,0.6); padding: 8px; border: 1px solid rgba(255, 200, 120, 0.4);
      text-align: center; color: #aaa; font-weight: bold; transition: .3s;
    }
    .status.deleted { color: #00ff99; box-shadow: 0 0 10px #00ff99; }
    .status.loading { color:#0f0; animation: blink .8s infinite }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .btn {
      margin-top: 8px; width: 100%; padding: 10px; background: rgba(255, 180, 80, 0.2);
      border: 1px solid rgba(255, 200, 120, 0.5); color: #ffcc66; font-weight: bold; cursor: pointer; transition: .3s;
    }
    .btn:hover { background: rgba(255, 180, 80, 0.4); box-shadow: 0 0 10px #ffcc66; }
    .btn:disabled { opacity:.4; cursor:not-allowed }

    .log {
      margin-top: 10px; max-height: 90px; overflow:auto; background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 200, 120, 0.3); padding:6px; font-size:11px
    }
    .log div { opacity:.8 }
  </style>
</head>
<body>

<div class="panel">

  <div class="title-glitch" data-text="XOÁ MÃ ẨN">XOÁ MÃ ẨN</div>

  <div class="alert" id="serverList">
    <div data-value="SHBET">SHBET</div>
    <div data-value="QQ88">QQ88</div>
    <div data-value="C168">C168</div>
    <div data-value="MB66">MB66</div>
    <div data-value="HI88">HI88</div>
    <div data-value="CM88">CM88</div>
  </div>

  <div class="separator"></div>

  <div class="field">
    <div class="label">- TÊN TK -</div>
    <input type="text" id="username" placeholder="Chọn server trước..." disabled>
    <div id="hint" class="hint">Chỉ chữ + số, tối thiểu 6 ký tự, không khoảng trắng</div>
  </div>

  <div class="field">
    <div class="label">- MÃ ẨN -</div>
    <input type="text" id="code" readonly>
  </div>

  <div class="field">
    <div class="label">- TÌNH TRẠNG -</div>
    <div class="status" id="statusBox">CHƯA XOÁ</div>
  </div>

  <button class="btn" id="deleteBtn" onclick="deleteCode()" disabled>XOÁ</button>

  <button class="btn" id="playBtn" onclick="goGame()" disabled>VÀO GAME</button>

  <div class="log" id="log"></div>
</div>

<script>
  function randomCode(length = 16) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  const usernameInput = document.getElementById('username');
  const serverList = document.getElementById('serverList');
  const codeInput = document.getElementById('code');
  const statusBox = document.getElementById('statusBox');
  const deleteBtn = document.getElementById('deleteBtn');
  const hint = document.getElementById('hint');
  const logBox = document.getElementById('log');

  let selectedServer = null;

  const gameLinks = {
    QQ88:  "https://www.qq8886.com/",
    C168:  "https://c1688.net",
    SHBET: "https://shbet800.com/",
    MB66: "https://www.mb669.pro/",
    HI88: "https://hi2011.com/",
    CM88: "https://cm88.com/",
  };

  function log(msg){
    const t = new Date().toLocaleTimeString();
    const el = document.createElement('div');
    el.textContent = `[${t}] ${msg}`;
    logBox.prepend(el);
  }

  serverList.querySelectorAll('div').forEach(item => {
    item.addEventListener('click', () => {
      serverList.querySelectorAll('div').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      selectedServer = item.dataset.value;

      usernameInput.disabled = false;
      usernameInput.placeholder = 'Nhập tên tài khoản...';
    
      log(`Chọn server ${selectedServer}`);
    });
  });

  function isValid(u){ 
  return /^(?=.*[a-zA-Z])[a-zA-Z0-9]{6,}$/.test(u); 
}

 
  usernameInput.addEventListener('input', function(){
    if (this.value.includes(' ')) this.value = this.value.replace(/\s/g,'');

    const val = this.value;

    if (val === ''){
      codeInput.value = '';
      statusBox.textContent = 'CHƯA XOÁ';
      statusBox.classList.remove('deleted');
      deleteBtn.disabled = true;
      hint.classList.remove('error');
      return;
    }

    if (!isValid(val)){
      hint.textContent = 'Sai cú pháp: chỉ chữ + số, ≥ 6 ký tự';
      hint.classList.add('error');
      deleteBtn.disabled = true;
      return;
    }

    hint.textContent = 'Hợp lệ';
    hint.classList.remove('error');
    deleteBtn.disabled = false;
  });

  
  usernameInput.addEventListener('blur', function(){
    if (isValid(this.value)){
      let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let fake = '';
      let count = 0;

      statusBox.textContent = 'DECRYPTING...';
      statusBox.classList.add('loading');

      const interval = setInterval(() => {
        fake = '';
        for (let i = 0; i < 16; i++) {
          fake += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        codeInput.value = fake;
        count++;

        if (count > 10){
          clearInterval(interval);
          codeInput.value = randomCode();
          statusBox.classList.remove('loading');
          statusBox.textContent = 'SẴN SÀNG';
        }
      }, 80);
    }
  });

  function goGame(){
    if (!selectedServer) return;

    const url = gameLinks[selectedServer];

    if (!url){
      alert('Chưa có link cho server này!');
      return;
    }

    log(`Mở game: ${selectedServer}`);
    window.open(url, '_blank');
  }

  function deleteCode(){
    if (!selectedServer || !isValid(usernameInput.value)) return;

    statusBox.textContent = 'ĐANG XOÁ...';
    statusBox.classList.add('loading');
    deleteBtn.disabled = true;

    log(`Gửi yêu cầu xoá: ${usernameInput.value} @ ${selectedServer}`);

    setTimeout(()=>{
      statusBox.classList.remove('loading');
      statusBox.textContent = 'ĐÃ XOÁ';
      statusBox.classList.add('deleted');
      log(`Xoá thành công: ${usernameInput.value}`);

      
      document.getElementById('playBtn').disabled = false;
    }, 1200);
  }
</script>

<div style="position: fixed; bottom: 55px; width: 100%; text-align: center; font-size: 20px; opacity: 0.6;">
  TOOL XOÁ MÃ ẨN CỦA HIỆU
</div>

</body>
</html>
